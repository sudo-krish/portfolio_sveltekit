<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ===================================== -->
    <!-- CRITICAL INLINE SCRIPT (No blocking) -->
    <!-- ===================================== -->
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light');
            } else {
                document.documentElement.classList.remove('light');
            }
        })();
    </script>

    <!-- ===================================== -->
    <!-- PERFORMANCE & FONTS                   -->
    <!-- ===================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- GA4 script moved to CookieBanner.svelte to ensure it only fires affirmatively post-consent (GDPR/CCPA compliance) -->

    <!-- ===================================== -->
    <!-- RESOURCE HINTS (Speed optimization)   -->
    <!-- ===================================== -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://api.github.com" />
    <link rel="preconnect" href="https://api.github.com" crossorigin />

    <!-- ===================================== -->
    <!-- FAVICON - GOOGLE SEARCH             -->
    <!-- ===================================== -->
    <!-- Main favicon for Google Search (REQUIRED for search results) -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Krishnanand" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ===================================== -->
    <!-- META TAGS                            -->
    <!-- ===================================== -->
    <meta name="theme-color" content="#667eea" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)" />
    <meta name="msapplication-TileColor" content="#1e293b" />

    <link rel="author" href="/humans.txt" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Krishnanand Anil" />

    %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover" class="bg-background text-foreground font-sans antialiased selection:bg-accent/30 selection:text-foreground">
    <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
