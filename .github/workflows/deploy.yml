name: Deploy Svelte to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # camera-controls@3.1.2 requires Node >= 22

      - name: Install dependencies
        run: npm install

      - name: Build Svelte project
        run: npm run build

      - name: Inject Dynamic Environment Variables
        run: |
          echo "[vars]" >> wrangler.toml
          echo "PUBLIC_GITHUB_USERNAME=\"${{ vars.PUBLIC_GITHUB_USERNAME }}\"" >> wrangler.toml
          echo "PUBLIC_LEETCODE_USERNAME=\"${{ vars.PUBLIC_LEETCODE_USERNAME }}\"" >> wrangler.toml
          echo "PUBLIC_GA_MEASUREMENT_ID=\"${{ vars.PUBLIC_GA_MEASUREMENT_ID }}\"" >> wrangler.toml

      - name: Inject Encrypted GITHUB_TOKEN Secret
        run: |
          echo "${{ secrets.PERSONAL_GITHUB_TOKEN }}" | npx wrangler pages secret put GITHUB_TOKEN --project-name krishnanandanil-portfolio
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # NEW: Using wrangler-action instead of deprecated pages-action
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The command syntax has changed for wrangler v3/v4
          command: pages deploy .svelte-kit/cloudflare --project-name=krishnanandanil-portfolio --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
